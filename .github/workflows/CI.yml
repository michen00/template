---
name: CI
on:
  pull_request:
    branches: [main]
    paths:
      - .codespellrc
      - .coveragerc
      - .editorconfig
      - .gitlint
      - .pylintrc
      - .python-version
      - .yamllint
      - '**/*.lock'
      - '**/*.md'
      - '**/*.py'
      - '**/*.sh'
      - '**/*.toml'
      - '**/*.yaml'
      - '**/*.yml'
      - src/**
      - tests/**
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -el {0}

env:
  CACHE_NUMBER: 0

jobs:
  run-ci:
    name: Run CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13']
    permissions:
      id-token: write # for trufflehog
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Secret scanning
        uses: trufflesecurity/trufflehog@v3.93.8
        with:
          extra_args: --results=verified,unknown
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            .github/workflows/.cache-buster
            .github/workflows/CI.yml
            noxfile.py
            pyproject.toml
            uv.lock
          python-version: ${{ matrix.python-version }}
      - name: Prepare cache keys
        id: prepare-cache-keys
        env:
          HASH_PRECOMMIT: ${{ hashFiles('.pre-commit-config.yaml') }}
        run: |-
          STAMP="$(date +'%Y%m%d')-${CACHE_NUMBER}"
          echo "pc=${HASH_PRECOMMIT}-${STAMP}" >> "$GITHUB_OUTPUT"
      - name: Cache pre-commit hooks
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-precommit-${{ steps.prepare-cache-keys.outputs.pc }}
      - name: Run CI
        run: |-
          bash .github/scripts/ci-ruff-args.sh
          uv run --locked --only-group dev nox -s test -s precommit
